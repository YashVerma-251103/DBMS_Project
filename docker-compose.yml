services:
  backend:
    build: ./backend
    env_file: [.env]          # DATABASE_URL (Supabase) + PORT; .env is gitignored
    ports:
      - "5000:5000"           # debug convenience; safe to drop - nginx reaches the
                              # backend over the compose network regardless
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
