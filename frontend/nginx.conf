server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # React Router owns client-side paths: a hard refresh on /dashboard must serve
  # index.html rather than 404.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # The trailing slash on proxy_pass is load-bearing: it strips the /api prefix,
  # so /api/users/login reaches the backend as /users/login, matching the route
  # mounts in backend/src/index.ts. Drop the slash and every call 404s.
  location /api/ {
    proxy_pass http://backend:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
